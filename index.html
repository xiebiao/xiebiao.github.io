<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>于川海</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.8.1/dist/css/foundation.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="grid-container fluid">
      <div class="grid-x align-center">
        <div class="cell small-12">
          <figure>
            <a href="https://blog.xiebiao.com" target="_blank" rel="noopener noreferrer">
            <picture>
              <!-- 移动端：宽度 ≤ 600px，按 1x/2x 选图 -->
              <source
                media="(max-width: 600px)"
                srcset="images/photo-480w.jpg 1x,
                        images/photo-960w.jpg 2x">
              <!-- PC 端：按设备像素比选图 -->
              <source
                srcset="images/photo-960w.jpg 1x,
                        images/photo-1920w.jpg 2x,
                        images/photo-2880w.jpg 3x">
              <img
                src="images/photo-960w.jpg"
                alt="Biao Xie"
                width="1920"
                height="1080"
                loading="lazy">
            </picture>
            </a>
            <p class="subtitle">二零二五八月·青海茫崖冷湖</p>
          </figure>
          <div class="poem">
            <p>傍晚</p>
            <p>躺在丰收后的油菜地里</p>
            <p>仰望着故乡的天空</p>
            <p>有几只飞鸟</p>
            <p>吃掉了刚刚升起的星星</p>
            <br>
            <p>那一夜</p>
            <p>睡得很深，深到土里</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
